<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Muhammad Ammar Jamali — AI Engineer</title>
<meta name="description" content="Muhammad Ammar Jamali — AI Engineer & ML Developer. Building end-to-end machine learning systems that ship to production.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="icon" type="image/png" href="favicon.jpg">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --sans:'Inter',sans-serif;
  --serif:'Instrument Serif',Georgia,serif;
  --mono:'JetBrains Mono',monospace;
  --ease:.3s cubic-bezier(.4,0,.2,1);
  --max:1100px;
  --pad:clamp(1.5rem,4vw,4rem);
}
[data-theme="dark"]{
  --bg:#050505;--bg2:#0d0d0d;--bg3:#141414;--bg4:#1a1a1a;
  --text:#efefef;--muted:rgba(239,239,239,.45);--muted2:rgba(239,239,239,.2);
  --border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.16);
  --card:#0d0d0d;--nav-bg:rgba(5,5,5,.9);
  --rect-bg:#0d0d0d;--rect-hover:#131313;
  --accent:#efefef;--accent2:rgba(239,239,239,.06);
  --cli-bg:#0a0a0e;--cli-green:#4ade80;--cli-purple:#a78bfa;--cli-cyan:#67e8f9;
  --tag-bg:rgba(255,255,255,.05);--tag-border:rgba(255,255,255,.1);
  --frame-bg:#0d0d0d;--frame-border:rgba(255,255,255,.1);
}
[data-theme="light"]{
  --bg:#f5f4f0;--bg2:#eceae4;--bg3:#e2dfd8;--bg4:#d8d5ce;
  --text:#141414;--muted:#555550;--muted2:#999890;
  --border:rgba(0,0,0,.1);--border2:rgba(0,0,0,.2);
  --card:#faf9f6;--nav-bg:rgba(245,244,240,.92);
  --rect-bg:#faf9f6;--rect-hover:#f0efe9;
  --accent:#141414;--accent2:rgba(0,0,0,.04);
  --cli-bg:#1a1a26;--cli-green:#4ade80;--cli-purple:#a78bfa;--cli-cyan:#67e8f9;
  --tag-bg:rgba(0,0,0,.06);--tag-border:rgba(0,0,0,.12);
  --frame-bg:#eceae4;--frame-border:rgba(0,0,0,.15);
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:15px;line-height:1.65;font-weight:300;-webkit-font-smoothing:antialiased;transition:background var(--ease),color var(--ease);overflow-x:hidden}
a{color:inherit;text-decoration:none}
::selection{background:rgba(128,128,128,.18)}

/* ── NAV ── */
nav{position:fixed;top:0;left:0;right:0;z-index:500;display:flex;align-items:center;justify-content:space-between;padding:.9rem var(--pad);gap:1rem;border-bottom:1px solid transparent;transition:border-color var(--ease),background var(--ease);min-width:0}
nav.scrolled{border-color:var(--border2);background:var(--nav-bg);backdrop-filter:blur(20px)}
.nav-logo{font-family:var(--serif);font-size:1.05rem;cursor:pointer;flex-shrink:0;transition:opacity .2s;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nav-logo:hover{opacity:.5}
.nav-tabs{display:flex;border:1px solid var(--border2);border-radius:100px;overflow-x:auto;flex-shrink:1;min-width:0;scrollbar-width:none;-ms-overflow-style:none}
.nav-tabs::-webkit-scrollbar{display:none}
.nav-tab{padding:.4rem .9rem;font-size:11.5px;color:var(--muted);cursor:pointer;transition:background .2s,color .2s;letter-spacing:.02em;white-space:nowrap;flex-shrink:0}
.nav-tab:hover{color:var(--text)}
.nav-tab.active{background:var(--accent2);color:var(--text)}
.nav-right{display:flex;gap:.6rem;align-items:center;flex-shrink:0}
.icon-btn{width:32px;height:32px;border-radius:7px;border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:background .2s,color .2s}
.icon-btn:hover{background:var(--accent2);color:var(--text)}
.nav-cta{font-size:11.5px;padding:.4rem .9rem;border:1px solid var(--border2);border-radius:100px;color:var(--muted);transition:background .2s,color .2s,border-color .2s;white-space:nowrap}
.nav-cta:hover{color:var(--text);border-color:var(--text);background:var(--accent2)}

/* ── PAGES ── */
.page{display:none;min-height:100vh;animation:pgIn .35s ease}
.page.active{display:block}
@keyframes pgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ── HERO ── */
.hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:8rem var(--pad) 5rem;position:relative}
.hero-eyebrow{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;margin-bottom:2.25rem;display:flex;align-items:center;gap:10px;justify-content:center}
.live-dot{width:6px;height:6px;background:#4ade80;border-radius:50%;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
.hero h1{font-family:var(--serif);font-weight:400;font-size:clamp(3.25rem,7.5vw,6.5rem);line-height:1.0;letter-spacing:-.025em;margin-bottom:2rem;max-width:820px}
.hero h1 em{font-style:italic;color:var(--muted)}
.hero-bio{font-size:15px;color:var(--muted);max-width:440px;line-height:1.8;margin-bottom:3rem;font-weight:300}
.hero-actions{display:flex;align-items:center;gap:1rem;flex-wrap:wrap;justify-content:center}
.btn-pill{font-size:12px;padding:9px 20px;border:1px solid var(--border2);border-radius:100px;color:var(--text);transition:background .2s,border-color .2s;cursor:pointer;background:transparent;font-family:var(--sans);letter-spacing:.02em}
.btn-pill:hover{background:var(--accent2);border-color:var(--text)}
.btn-pill.ghost{color:var(--muted);border-color:transparent}
.btn-pill.ghost:hover{color:var(--text);background:transparent;border-color:transparent}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.fadein{animation:fadeUp .7s ease both}
.fadein:nth-child(1){animation-delay:.02s}
.fadein:nth-child(2){animation-delay:.12s}
.fadein:nth-child(3){animation-delay:.22s}
.fadein:nth-child(4){animation-delay:.32s}

/* ── LAYOUT ── */
hr.div{border:none;border-top:1px solid var(--border)}
.section{max-width:var(--max);margin:0 auto;padding:clamp(3rem,5vw,5rem) var(--pad)}
.section-wide{max-width:1300px;margin:0 auto;padding:5rem var(--pad)}
.sec-label{font-family:var(--mono);font-size:10px;color:var(--muted2);letter-spacing:.18em;text-transform:uppercase;margin-bottom:2.5rem;display:flex;align-items:center;gap:12px}
.sec-label::after{content:'';width:24px;height:1px;background:var(--border2)}
.prose{font-size:.975rem;color:var(--muted);line-height:1.95;font-weight:300}
.prose+.prose{margin-top:1.15rem}

/* ── INJECTED AWESOME PROJECT & EXP STYLES ── */
.project-grid{display:flex;flex-direction:column;gap:clamp(3rem,5vw,5rem)}
.project-card{display:grid;grid-template-columns:1.1fr 1fr;gap:4rem;align-items:center}
.project-visual{width:100%;aspect-ratio:16/10;background:var(--frame-bg);border:1px solid var(--border2);border-radius:8px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;transition:border-color var(--ease)}
.project-card:hover .project-visual{border-color:var(--text)}
.code-canvas{width:88%;height:75%;background:var(--cli-bg);border:1px solid var(--border);border-radius:6px;font-family:var(--mono);font-size:11px;padding:1.2rem;color:var(--muted);overflow:hidden;position:relative}
.code-header{display:flex;align-items:center;gap:6px;margin-bottom:1rem;border-bottom:1px solid var(--border);padding-bottom:.5rem;font-size:10px}
.code-dot{width:5px;height:5px;border-radius:50%;background:var(--muted2)}
.project-meta{display:flex;flex-direction:column}
.project-index{font-family:var(--mono);font-size:11px;color:var(--muted2);margin-bottom:.5rem}
.project-title{font-family:var(--serif);font-size:clamp(1.8rem,2.5vw,2.4rem);font-weight:400;line-height:1.2;margin-bottom:1rem;color:var(--text)}
.project-description{font-size:14px;color:var(--muted);line-height:1.75;margin-bottom:1.5rem}
.project-tags{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:1.5rem}
.project-tag{font-family:var(--mono);font-size:10px;color:var(--muted);background:var(--tag-bg);border:1px solid var(--tag-border);padding:2px 10px;border-radius:4px}
.project-links{display:flex;gap:1.5rem;font-family:var(--mono);font-size:11px;color:var(--muted)}
.project-links a:hover{color:var(--text)}

.timeline-container{display:flex;flex-direction:column;gap:.5rem}
.timeline-node{border-left:1px solid var(--border2);padding-left:clamp(1.25rem,3vw,2rem);position:relative;padding-bottom:3.5rem}
.timeline-node:last-of-type{padding-bottom:1rem}
.timeline-node::before{content:'';position:absolute;left:-3.5px;top:6px;width:6px;height:6px;background:var(--muted2);border-radius:50%;transition:background .3s}
.timeline-node:hover::before{background:var(--text)}
.node-date{font-family:var(--mono);font-size:11px;color:var(--muted2);margin-bottom:.4rem}
.node-role{font-family:var(--serif);font-size:1.7rem;font-weight:400;color:var(--text);line-height:1.2}
.node-company{font-family:var(--mono);font-size:11px;letter-spacing:.05em;color:var(--muted);margin-bottom:1rem;text-transform:uppercase}
.node-summary{font-size:14px;color:var(--muted);max-width:750px;line-height:1.8}
.node-summary p{margin-bottom: 0.5rem;}

/* ── SKILL RECTS ── */
.skill-rect-list{display:flex;flex-direction:column;gap:0;border:1px solid var(--border2);border-radius:6px;overflow:hidden}
.skill-rect{display:grid;grid-template-columns:160px 1fr;background:var(--rect-bg);border-bottom:1px solid var(--border);transition:background .18s;position:relative;overflow:hidden}
.skill-rect:last-child{border-bottom:none}
.skill-rect::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:transparent;transition:background .18s}
.skill-rect:hover{background:var(--rect-hover)}
.skill-rect:hover::before{background:var(--text)}
.skill-rect-cat{font-family:var(--mono);font-size:10.5px;color:var(--muted2);padding:1.1rem 1.5rem;border-right:1px solid var(--border);letter-spacing:.04em;display:flex;align-items:center}
.skill-rect-vals{font-size:12.5px;color:var(--muted);padding:1.1rem 1.5rem;line-height:1.7}

/* ── EDU RECTS ── */
.edu-rect-list{display:flex;flex-direction:column;border:1px solid var(--border2);border-radius:6px;overflow:hidden}
.edu-rect{display:flex;justify-content:space-between;align-items:center;background:var(--rect-bg);border-bottom:1px solid var(--border);padding:1.25rem 1.5rem;gap:2rem;transition:background .18s;position:relative;overflow:hidden}
.edu-rect:last-child{border-bottom:none}
.edu-rect::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:transparent;transition:background .18s}
.edu-rect:hover{background:var(--rect-hover)}
.edu-rect:hover::before{background:var(--text)}
.edu-rect-name{font-size:13.5px;color:var(--text);margin-bottom:2px}
.edu-rect-sub{font-family:var(--mono);font-size:10.5px;color:var(--muted2)}
.edu-rect-yr{font-family:var(--mono);font-size:10.5px;color:var(--muted2);white-space:nowrap;flex-shrink:0}

/* ── CONTACT RECTS ── */
.ct-rect-list{display:flex;flex-direction:column;border:1px solid var(--border2);border-radius:6px;overflow:hidden}
.ct-rect{display:flex;justify-content:space-between;align-items:center;background:var(--rect-bg);border-bottom:1px solid var(--border);padding:1.1rem 1.5rem;transition:background .18s;position:relative;overflow:hidden}
.ct-rect:last-child{border-bottom:none}
.ct-rect::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:transparent;transition:background .18s}
.ct-rect:hover{background:var(--rect-hover)}
.ct-rect:hover::before{background:var(--text)}
.ct-rect-label{font-family:var(--mono);font-size:10px;color:var(--muted2);letter-spacing:.1em;text-transform:uppercase}
.ct-rect a{font-size:12.5px;color:var(--muted);transition:color .15s;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:60vw}
.ct-rect a:hover{color:var(--text)}

/* ── ABOUT PAGE ── */
.about-page-hero{min-height:60vh;display:flex;flex-direction:column;align-items:flex-start;justify-content:flex-end;padding:8rem var(--pad) 4rem;max-width:1300px;margin:0 auto}
.about-page-hero h2{font-family:var(--serif);font-weight:400;font-size:clamp(2.5rem,5vw,5rem);line-height:1.05;letter-spacing:-.025em;margin-bottom:1.25rem;max-width:700px}
.about-page-hero h2 em{font-style:italic;color:var(--muted)}
.about-page-hero p{font-size:14px;color:var(--muted);max-width:460px;line-height:1.9}
.about-chapters{max-width:var(--max);margin:0 auto;padding:0 var(--pad) 4rem}
.chapter{display:grid;grid-template-columns:180px 1fr;border-bottom:1px solid var(--border);padding:2.5rem 0;gap:3rem}
.chapter:first-child{border-top:1px solid var(--border)}
.chapter-label{font-family:var(--mono);font-size:10px;color:var(--muted2);letter-spacing:.15em;text-transform:uppercase;padding-top:.2rem}
.chapter-text{font-size:.975rem;color:var(--muted);line-height:2}

/* ── ABOUT PHOTO (static) ── */
.about-photo-section{max-width:var(--max);margin:0 auto;padding:3rem var(--pad) 4rem;display:grid;grid-template-columns:240px 1fr;gap:3.5rem;align-items:start;width:100%}
.about-bio-text{padding-top:.25rem;display:flex;flex-direction:column;gap:0}

/* ── MEDIA SHOWCASE ── */
.media-showcase{max-width:1200px;margin:0 auto;padding:0 var(--pad) 5rem}
.media-hero-label{font-family:var(--mono);font-size:10px;color:var(--muted2);letter-spacing:.18em;text-transform:uppercase;margin-bottom:3rem;display:flex;align-items:center;gap:12px}
.media-hero-label::after{content:'';width:24px;height:1px;background:var(--border2)}

/* Reel grid */
.reel-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.25rem;margin-bottom:1.25rem}
@media(max-width:768px){.reel-grid{grid-template-columns:1fr;gap:1rem}}

.reel-card{position:relative;aspect-ratio:9/16;border-radius:12px;overflow:hidden;background:#0a0a0a;cursor:default;isolation:isolate}
.reel-card::before{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.75) 0%,rgba(0,0,0,.15) 50%,transparent 100%);z-index:1;transition:opacity .4s ease}
.reel-card:hover::before{opacity:.85}
.reel-card video,.reel-card img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;transition:transform .7s cubic-bezier(.25,1,.5,1)}
.reel-card:hover video,.reel-card:hover img{transform:scale(1.04)}
.reel-caption{position:absolute;bottom:0;left:0;right:0;z-index:2;padding:1.5rem 1.25rem 1.25rem;transform:translateY(4px);transition:transform .4s ease;opacity:0;transition:opacity .35s ease,transform .35s ease}
.reel-card:hover .reel-caption{opacity:1;transform:translateY(0)}
.reel-caption-index{font-family:var(--mono);font-size:9px;color:rgba(255,255,255,.45);letter-spacing:.15em;text-transform:uppercase;margin-bottom:.3rem}
.reel-caption-title{font-size:13px;color:#fff;font-weight:400;line-height:1.4}
.reel-glow{position:absolute;inset:0;z-index:0;border-radius:12px;box-shadow:inset 0 0 0 1px rgba(255,255,255,.07);pointer-events:none;transition:box-shadow .4s}
.reel-card:hover .reel-glow{box-shadow:inset 0 0 0 1px rgba(255,255,255,.16),0 0 40px rgba(255,255,255,.04)}

/* Placeholder reel card (before you add real media) */
.reel-placeholder-static{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.6rem;z-index:1}
.reel-placeholder-static .rpl-num{font-family:var(--mono);font-size:10px;color:rgba(255,255,255,.12);letter-spacing:.18em;text-transform:uppercase}
.reel-placeholder-static .rpl-bar{width:32px;height:1px;background:rgba(255,255,255,.08)}

/* Visuals row (2-col) */
.visuals-row{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem}
@media(max-width:600px){.visuals-row{grid-template-columns:1fr;gap:1rem}}

.visual-card{position:relative;border-radius:12px;overflow:hidden;background:#0a0a0a;isolation:isolate}
.visual-card.portrait{aspect-ratio:3/4}
.visual-card.landscape{aspect-ratio:16/9}
.visual-card img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;transition:transform .7s cubic-bezier(.25,1,.5,1);filter:grayscale(15%)}
.visual-card:hover img{transform:scale(1.04);filter:grayscale(0%)}
.visual-card::after{content:'';position:absolute;inset:0;background:linear-gradient(160deg,rgba(255,255,255,.02) 0%,transparent 60%);pointer-events:none}
.visual-glow{position:absolute;inset:0;z-index:2;border-radius:12px;box-shadow:inset 0 0 0 1px rgba(255,255,255,.07);pointer-events:none;transition:box-shadow .4s}
.visual-card:hover .visual-glow{box-shadow:inset 0 0 0 1px rgba(255,255,255,.16)}
.visual-placeholder-static{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.5rem}
.visual-placeholder-static span{font-family:var(--mono);font-size:9px;color:rgba(255,255,255,.1);letter-spacing:.16em;text-transform:uppercase}

/* Scroll reveal */
.reveal{opacity:0;transform:translateY(20px);transition:opacity .65s ease,transform .65s ease}
.reveal.visible{opacity:1;transform:translateY(0)}

/* ── THOUGHTS ── */
.thoughts-wrap{max-width:880px;margin:0 auto;padding:4rem var(--pad)}
.thoughts-header{font-family:var(--mono);font-size:10px;color:var(--muted2);letter-spacing:.15em;text-transform:uppercase;margin-bottom:2.5rem}
.thought{padding:1.75rem 0;border-bottom:1px solid var(--border)}
.thought:first-of-type{border-top:1px solid var(--border)}
.thought-date{font-family:var(--mono);font-size:10px;color:var(--muted2);margin-bottom:.65rem}
.thought-text{font-size:14px;color:var(--muted);line-height:1.95;font-weight:300;max-width:700px}

/* ── NOVAPAD ── */
.novapad-section{max-width:var(--max);margin:0 auto;padding:3rem var(--pad) 3rem}
.novapad-label{font-family:var(--mono);font-size:10px;color:var(--muted2);letter-spacing:.16em;text-transform:uppercase;margin-bottom:.5rem}
.novapad-sub{font-family:var(--mono);font-size:9px;color:var(--muted2);opacity:.5;margin-bottom:1.75rem;letter-spacing:.04em}
.novapad-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.nova-pad{background:var(--frame-bg);border:1px solid var(--frame-border);border-radius:5px;height:82px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;user-select:none;transition:background .07s,border-color .07s,transform .05s;-webkit-tap-highlight-color:transparent}
.nova-pad .pad-key{font-family:var(--mono);font-size:16px;color:var(--text);opacity:.55;margin-bottom:3px;line-height:1}
.nova-pad .pad-note{font-family:var(--mono);font-size:9px;color:var(--muted2);opacity:.45;letter-spacing:.04em}
.nova-pad:hover{border-color:var(--border2);background:var(--rect-hover)}
.nova-pad.active{background:rgba(74,222,128,.08);border-color:rgba(74,222,128,.3);transform:scale(.95)}

/* ── CHAT FLOAT BUTTON ── */
.chat-float{
  position:fixed;bottom:2rem;right:2rem;z-index:300;
  background:rgba(10,10,10,.85);border:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(15px);-webkit-backdrop-filter:blur(15px);
  padding:.6rem 1.4rem;border-radius:100px;
  display:flex;align-items:center;gap:12px;
  cursor:pointer;box-shadow:0 10px 30px rgba(0,0,0,.5);
  transition:all .3s ease;
}
.chat-float:hover{border-color:rgba(255,255,255,.18);transform:translateY(-2px)}
.chat-float-dot{width:6px;height:6px;background:#34d399;border-radius:50%;box-shadow:0 0 8px rgba(52,211,153,.5)}
.chat-float-label{font-family:var(--mono);font-size:11.5px;color:var(--text)}

/* ── CLI OVERLAY ── */
.agent-overlay{
  position:fixed;inset:0;background:rgba(3,3,3,.88);backdrop-filter:blur(10px);
  z-index:600;display:none;align-items:center;justify-content:center;padding:1rem;
  opacity:0;transition:opacity .3s ease;
}
.agent-overlay.open{display:flex;opacity:1}
.agent-panel{
  width:100%;max-width:600px;height:min(500px,calc(100vh - 2rem));background:#070708;
  border:1px solid rgba(255,255,255,.06);border-radius:12px;
  display:flex;flex-direction:column;overflow:hidden;
  box-shadow:0 40px 100px rgba(0,0,0,.9);
  transform:translateY(20px);transition:transform .4s cubic-bezier(0.25,1,0.5,1);
}
.agent-overlay.open .agent-panel{transform:translateY(0)}
.cli-topbar{
  display:flex;justify-content:space-between;align-items:center;
  padding:.8rem 1.5rem;border-bottom:1px solid rgba(255,255,255,.03);

}
.cli-dots{display:flex;gap:6px}
.cli-dot{width:10px;height:10px;border-radius:50%}
.cli-dot.close{background:#ff5f56;cursor:pointer}
.cli-dot.min{background:#ffbd2e}
.cli-dot.max{background:#27c93f}
.cli-title-text{font-family:var(--mono);font-size:11px;color:rgba(255,255,255,.25);letter-spacing:.05em}
.cli-body{
  flex-grow:1;padding:1.5rem;overflow-y:auto;

  display:flex;flex-direction:column;gap:.8rem;
  scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.08) transparent;
}
.cli-body::-webkit-scrollbar{width:3px}
.cli-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}
.cli-line.system{color:rgba(255,255,255,.3);font-size:11px}
.cli-line.prompt{color:rgba(255,255,255,.9)}
.cli-line.prompt::before{content:'~/ammar $ ';color:rgba(255,255,255,.3)}
.cli-line.response{color:#e1e1e6;padding-left:.5rem;border-left:1px solid rgba(255,255,255,.04)}
.cli-chips{
  display:flex;flex-wrap:wrap;gap:.5rem;
  padding:.5rem 1.5rem;border-top:1px solid rgba(255,255,255,.025);flex-shrink:0;
}
.cli-chip{
  font-family:var(--mono);font-size:10.5px;padding:5px 12px;
  border:1px solid rgba(255,255,255,.05);border-radius:100px;

  transition:color .2s,border-color .2s,background .2s;
}
.cli-chip:hover{color:rgba(255,255,255,.9);border-color:rgba(255,255,255,.2);background:rgba(255,255,255,.02)}
.cli-input-row{
  display:flex;align-items:center;padding:1rem 1.5rem;
  border-top:1px solid rgba(255,255,255,.03);

.cli-input-label{font-family:var(--mono);color:rgba(255,255,255,.3);font-size:12.5px;margin-right:8px;flex-shrink:0}
.cli-input{
  flex-grow:1;background:transparent;border:none;outline:none;
  font-family:var(--mono);font-size:12.5px;color:#34d399;caret-color:#34d399;
}
.cli-input::placeholder{color:rgba(255,255,255,.18)}

/* ── PERSONAL PAGE ── */
.hero-description{font-size:15px;color:var(--muted);max-width:520px;line-height:1.8;text-align:center;margin-top:.5rem}
.novapad-wrapper{background:rgba(255,255,255,0.015);border:1px solid var(--border2);border-radius:12px;padding:2.5rem 1.5rem;margin-bottom:3rem;display:flex;flex-direction:column;align-items:center;width:100%;}
.novapad-title{font-family:var(--mono);font-size:11px;color:var(--muted2);letter-spacing:.1em;text-transform:uppercase;margin-bottom:2.5rem;text-align:center;}
.novapad-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;width:100%;max-width:520px;margin:0 auto;}
.nova-pad{width:100%;aspect-ratio:1;min-height:60px;background:#0d0d12;border:1px solid rgba(255,255,255,.08);border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:var(--mono);font-size:10px;color:rgba(255,255,255,.2);cursor:pointer;transition:all .1s ease;user-select:none;-webkit-tap-highlight-color:transparent;box-shadow:inset 0 0 10px rgba(0,0,0,.8),0 5px 15px rgba(0,0,0,.5);}
.nova-pad:hover{background:#121218;border-color:rgba(255,255,255,.15);}
.nova-pad.active{background:rgba(16,185,129,.15);border-color:#4ade80;color:#fff;box-shadow:inset 0 0 20px rgba(16,185,129,.4),0 0 20px rgba(16,185,129,.3);transform:scale(.95);}
.creative-media-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:2rem;margin-bottom:4rem}
.media-slot{background:var(--rect-bg);border:1px solid var(--border2);border-radius:8px;overflow:hidden;display:flex;flex-direction:column;transition:all .3s ease}
.media-slot:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 10px 30px rgba(0,0,0,.4);}
.video-container-mock{width:100%;aspect-ratio:9/16;background:linear-gradient(180deg,#0a0a0c,#030305);position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;border-bottom:1px solid var(--border);cursor:pointer}
.video-container-mock::after{content:'▶';font-size:20px;color:var(--muted);opacity:.5;width:50px;height:50px;display:flex;align-items:center;justify-content:center;border-radius:50%;border:1px solid var(--border);background:rgba(0,0,0,.4);transition:all .3s ease;}
.media-slot:hover .video-container-mock::after{opacity:1;color:#fff;transform:scale(1.05);border-color:var(--muted);}
.video-overlay-details{position:absolute;bottom:1.5rem;left:1.5rem;right:1.5rem;font-size:13px;color:var(--muted);text-shadow:0 2px 4px rgba(0,0,0,.8);}

/* ── MUSIC BAR ── */
.music-bar{position:fixed;bottom:2rem;left:2rem;z-index:300;display:flex;align-items:center;gap:.5rem;background:var(--bg2);border:1px solid var(--border2);border-radius:6px;padding:.5rem .85rem;font-family:var(--mono);font-size:11px;color:var(--muted);cursor:pointer;transition:background .2s;max-width:calc(50vw - 3rem)}

#musicLabel{display:inline}
.music-waves{display:flex;gap:2px;align-items:center;height:12px}
.music-wave{width:2px;border-radius:1px;background:currentColor;animation:wave 1s ease infinite}
.music-wave:nth-child(1){height:4px;animation-delay:0s}
.music-wave:nth-child(2){height:9px;animation-delay:.1s}
.music-wave:nth-child(3){height:12px;animation-delay:.2s}
.music-wave:nth-child(4){height:7px;animation-delay:.3s}
.music-wave:nth-child(5){height:4px;animation-delay:.4s}
@keyframes wave{0%,100%{transform:scaleY(.35)}50%{transform:scaleY(1)}}
.music-waves.paused .music-wave{animation-play-state:paused}

/* ── FOOTER ── */
footer{border-top:1px solid var(--border);padding:1.5rem var(--pad);display:flex;justify-content:space-between;align-items:center}
footer p{font-family:var(--mono);font-size:10.5px;color:var(--muted2)}

<body>

<nav id="nav"></nav>

<div class="music-bar" onclick="toggleMusic()">
  <span>♪</span>
  <span id="musicLabel">Ambient</span>
  <div class="music-waves paused" id="musicWaves">
    <div class="music-wave"></div><div class="music-wave"></div>
    <div class="music-wave"></div><div class="music-wave"></div>
    <div class="music-wave"></div>
  </div>
</div>

<div class="chat-float" onclick="openAgent()">
  <div class="chat-float-dot"></div>
  <span class="chat-float-label">ammar.ai ~</span>
</div>

<!-- Page shells — content injected by render.js -->
<div class="page active" id="page-ai"></div>
<div class="page" id="page-web"></div>
<div class="page" id="page-exp"></div>
<div class="page" id="page-about"></div>
<div class="page" id="page-personal"></div>

<div class="agent-overlay" id="agentOverlay" onclick="if(event.target===this) closeAgent()">
  <div class="agent-panel" id="agentPanel">
    <div class="cli-topbar">
      <div class="cli-dots">
        <div class="cli-dot close" onclick="closeAgent()"></div>
        <div class="cli-dot min"></div>
        <div class="cli-dot max"></div>
      </div>
      <div class="cli-title-text">ammar.ai — Autonomous Interface</div>
      <div></div>
    </div>
    <div class="cli-body" id="cliBody"></div>
    <div class="cli-chips" id="chips">
      <button class="cli-chip" onclick="cliAsk('List AI systems built')">Core ML Systems</button>
      <button class="cli-chip" onclick="cliAsk('SpamScan metrics')">SpamScan Details</button>
      <button class="cli-chip" onclick="cliAsk('Availability status')">Availability</button>
      <button class="cli-chip" onclick="cliAsk('best ML result?')">Best Result</button>
    </div>
    <div class="cli-input-row">
      <span class="cli-input-label">~/ammar $</span>
      <input type="text" class="cli-input" id="cliInput" placeholder="Enter inquiry parameter..." onkeydown="if(event.key==='Enter') sendCli()">
    </div>
  </div>
</div>

<script src="data.js"></script>
<script>
// ── THEME ──
function toggleTheme(){
  const h=document.documentElement
  const t=h.getAttribute('data-theme')==='dark'?'light':'dark'
  h.setAttribute('data-theme',t)
  document.getElementById('themeToggle').textContent=t==='dark'?'◐':'◑'
}

// ── PAGES ──
function switchPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'))
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'))
  document.getElementById('page-'+id).classList.add('active')
  document.getElementById('tab-'+id).classList.add('active')
  window.scrollTo({top:0,behavior:'smooth'})
}
function goHome(){switchPage('ai')}
window.addEventListener('scroll',()=>document.getElementById('nav').classList.toggle('scrolled',window.scrollY>40))

// ── MUSIC ──
let audioCtx=null,musicPlaying=false
function toggleMusic(){
  if(!audioCtx){
    audioCtx=new(window.AudioContext||window.webkitAudioContext)()
    const master=audioCtx.createGain();master.gain.value=.08;master.connect(audioCtx.destination)
    ;[55,82,110,165,220].forEach(f=>{
      const o=audioCtx.createOscillator(),g=audioCtx.createGain(),flt=audioCtx.createBiquadFilter()
      o.type='sine';o.frequency.value=f;flt.type='lowpass';flt.frequency.value=350;g.gain.value=.12
      o.connect(flt);flt.connect(g);g.connect(master);o.start()
    })
  }
  if(!musicPlaying){
    if(audioCtx.state==='suspended')audioCtx.resume()
    musicPlaying=true
    document.getElementById('musicLabel').textContent='Playing'
    document.getElementById('musicWaves').classList.remove('paused')
  }else{
    audioCtx.suspend();musicPlaying=false
    document.getElementById('musicLabel').textContent='Ambient'
    document.getElementById('musicWaves').classList.add('paused')
  }
}

// ── SCROLL REVEAL ──
const revealObserver = new IntersectionObserver((entries) => {
  entries.forEach(e => { if(e.isIntersecting){ e.target.classList.add('visible'); revealObserver.unobserve(e.target) } })
}, { threshold: 0.08 })

// ── AI AGENT ──
let cliInitialized = false
function openAgent(){
  document.getElementById('agentOverlay').classList.add('open')
  if(!cliInitialized){
    cliPrint('system','Initializing ammar.ai intelligence matrix...')
    setTimeout(()=>cliPrint('system','Connection established. I know Ammar deeply — his projects, stack, and availability. Ready for inquiry parameters.'),650)
    cliInitialized=true
  }
  setTimeout(()=>document.getElementById('cliInput').focus(),300)
}
function closeAgent(){document.getElementById('agentOverlay').classList.remove('open')}
function closeAgentOutside(e){if(e.target===document.getElementById('agentOverlay'))closeAgent()}

function cliPrint(type,text){
  const b=document.getElementById('cliBody')
  const d=document.createElement('div');d.className='cli-line '+type
  d.textContent=text;b.appendChild(d);b.scrollTop=b.scrollHeight
  return d
}
function cliAsk(q){
  document.getElementById('chips').style.display='none'
  cliPrint('prompt',q)
  fetchCli(q)
}
function askChip(el){cliAsk(el.textContent)}
function sendCli(){
  const inp=document.getElementById('cliInput');const q=inp.value.trim()
  if(!q)return;inp.value=''
  document.getElementById('chips').style.display='none'
  cliPrint('prompt',q)
  fetchCli(q)
}

function fetchCli(q){
  const thinking=cliPrint('system','...')
  setTimeout(()=>{
    thinking.remove()
    const lines=getAgentReply(q)
    let lineIdx=0
    function printNextLine(){
      if(lineIdx>=lines.length)return
      const d=document.createElement('div');d.className='cli-line response'
      document.getElementById('cliBody').appendChild(d)
      const text=lines[lineIdx++];let i=0
      const iv=setInterval(()=>{
        d.textContent=text.slice(0,++i)
        document.getElementById('cliBody').scrollTop=document.getElementById('cliBody').scrollHeight
        if(i>=text.length){clearInterval(iv);setTimeout(printNextLine,80)}
      },12)
    }
    printNextLine()
  },420)
}

// ── NOVAPAD ──
let novaSynth=null
const activePads={}
function initNova(){if(!novaSynth)novaSynth=new(window.AudioContext||window.webkitAudioContext)()}
function strikePad(freq,el){
  initNova()
  if(novaSynth.state==='suspended')novaSynth.resume()
  if(activePads[freq])return
  el.classList.add('active')
  const o1=novaSynth.createOscillator(),o2=novaSynth.createOscillator(),env=novaSynth.createGain()
  o1.type='sine';o1.frequency.value=freq
  o2.type='triangle';o2.frequency.value=freq*1.002
  o1.connect(env);o2.connect(env);env.connect(novaSynth.destination)
  env.gain.setValueAtTime(0,novaSynth.currentTime)
  env.gain.linearRampToValueAtTime(.18,novaSynth.currentTime+.04)
  o1.start();o2.start()
  activePads[freq]={o1,o2,env,el}
}
function releasePad(freq){
  const n=activePads[freq];if(!n)return
  n.env.gain.setValueAtTime(n.env.gain.value,novaSynth.currentTime)
  n.env.gain.exponentialRampToValueAtTime(.0001,novaSynth.currentTime+.85)
  n.o1.stop(novaSynth.currentTime+.85);n.o2.stop(novaSynth.currentTime+.85)
  n.el.classList.remove('active');delete activePads[freq]
}
window.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT')return
  if(e.key==='Escape'){closeAgent();return}
  const pad=document.querySelector(`.nova-pad[data-trigger="${e.key.toLowerCase()}"]`)
  if(pad&&!e.repeat)strikePad(parseFloat(pad.getAttribute('data-pitch')),pad)
})
window.addEventListener('keyup',e=>{
  const pad=document.querySelector(`.nova-pad[data-trigger="${e.key.toLowerCase()}"]`)
  if(pad)releasePad(parseFloat(pad.getAttribute('data-pitch')))
})
</script>
<script src="render.js"></script>
